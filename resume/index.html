<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="AI简历优化器 - 基于DeepSeek大模型智能优化简历，AI评分+改写，提升面试机会。免费使用。">
  <meta name="keywords" content="简历优化,AI简历,简历改写,求职,简历评分,AI求职">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <title>AI简历优化器 - 智能简历评分+改写</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--gold:#D4A843;--gold-light:#F5E6CC;--red:#C41E3A;--bg:#FFF8F0;--card:#FFF;--text:#2D2D2D;--muted:#888;--border:#F0E6D3;--shadow:0 2px 16px rgba(0,0,0,0.06);--radius:16px}
    body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .container{padding:20px 16px 40px;max-width:480px;margin:0 auto}
    .hero{text-align:center;padding:24px 0 16px}
    .hero-icon{font-size:56px}
    .hero h1{font-size:26px;background:linear-gradient(135deg,#C41E3A,#D4A843);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .hero p{color:var(--muted);font-size:14px}
    .card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:14px;font-weight:600;margin-bottom:8px;color:#555}
    textarea{width:100%;padding:14px;border:2px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;resize:vertical;line-height:1.6;background:#FFFAF5}
    textarea:focus{outline:none;border-color:var(--gold)}
    .btn-primary{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#C41E3A,#E8453C);color:#FFF;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(196,30,58,0.25)}
    .btn-primary:disabled{opacity:0.6;cursor:not-allowed}
    .btn-sub{display:block;font-size:12px;font-weight:400;opacity:0.85;margin-top:4px}
    .result-section{margin-top:20px}
    .score-display{text-align:center;padding:20px}
    .score-num{font-size:64px;font-weight:700;color:var(--red)}
    .score-label{color:var(--muted);font-size:14px}
    .suggestions{margin-top:16px}
    .suggestion{padding:12px;background:#FFF7E0;border-radius:12px;margin-bottom:8px;font-size:14px;line-height:1.6}
    .suggestion .icon{margin-right:8px}
    .optimized-text{background:#F9FAFB;border:1px solid var(--border);border-radius:12px;padding:16px;font-size:14px;line-height:1.8;white-space:pre-wrap;margin-top:12px}
    .btn-copy{width:100%;padding:12px;border:2px solid var(--border);border-radius:12px;background:#FFF;font-size:14px;cursor:pointer;margin-top:8px}
    .loading{text-align:center;padding:40px}
    .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .upgrade-card{background:linear-gradient(135deg,#2D2D2D,#4A3728);color:#FFF;border-radius:var(--radius);padding:20px;text-align:center;margin-top:16px}
    .upgrade-card h3{font-size:18px;margin-bottom:6px}
    .upgrade-card p{font-size:13px;opacity:0.8;margin-bottom:14px}
    .btn-upgrade{padding:12px 32px;border:none;border-radius:24px;background:var(--gold);color:#2D2D2D;font-size:15px;font-weight:700;cursor:pointer}
    .feature-tabs{display:flex;gap:8px;margin-bottom:16px}
    .tab{flex:1;text-align:center;padding:10px;border:2px solid var(--border);border-radius:12px;font-size:13px;cursor:pointer;background:#FFF}
    .tab.active{border-color:var(--gold);background:var(--gold-light);font-weight:600}
    .tab-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-top:20px;border-top:1px solid var(--border)}
    .tab-bar a{color:var(--muted);text-decoration:none;font-size:13px}
    .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#FFF;padding:12px 24px;border-radius:24px;font-size:14px;z-index:200;animation:fadeInOut 2s forwards}
    @keyframes fadeInOut{0%{opacity:0;transform:translate(-50%,-50%) scale(0.8)}15%{opacity:1;transform:translate(-50%,-50%) scale(1)}85%{opacity:1}100%{opacity:0}}
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-icon">📝</div>
    <h1>AI 简历优化器</h1>
    <p>上传你的简历 · AI智能评分+改写 · 提升面试机会</p>
  </div>

  <div class="feature-tabs">
    <div class="tab active" onclick="switchTab('score')">📊 AI评分</div>
    <div class="tab" onclick="switchTab('rewrite')">✍️ AI改写</div>
    <div class="tab" onclick="switchTab('match')">🎯 岗位匹配</div>
    <div class="tab" onclick="switchTab('analyze')">🔍 深度分析</div>
  </div>

  <div class="card">
    <div class="form-group">
      <label id="resume-label">粘贴你的简历内容</label>
      <textarea id="resume-input" rows="5" placeholder="请粘贴你的简历文本（教育背景、工作经历、技能等）...&#10;&#10;💡 提示：越详细，AI分析越精准"></textarea>
    </div>
    <div class="form-group" id="jd-group" style="display:none;">
      <label>📋 粘贴招聘要求（从BOSS直聘复制）</label>
      <textarea id="jd-input" rows="6" placeholder="从BOSS直聘/猎聘复制岗位JD到这里...&#10;&#10;例如：&#10;【岗位职责】&#10;1. 负责xxx系统的设计与开发&#10;2. 参与xxx项目...&#10;【任职要求】&#10;1. 3年以上Java开发经验&#10;2. 熟悉Spring Cloud..."></textarea>
    </div>
    <button id="optimize-btn" class="btn-primary" onclick="optimize()">
      <span id="btn-main-text">🚀 AI 优化简历</span>
      <span class="btn-sub">免费评分 + 智能改写建议</span>
    </button>
  </div>

  <div id="result-area" style="display:none;">
    <div id="result-content"></div>
    <div class="upgrade-card">
      <div style="font-size:32px;margin-bottom:8px;">🔮</div>
      <h3>解锁深度优化</h3>
      <p>AI逐句改写 + 行业关键词优化 + ATS通过率分析</p>
      <button class="btn-upgrade" onclick="showDeepOptimize()">深度优化 ¥9.9</button>
    </div>
  </div>

  <div class="tab-bar">
    <a href="https://aw999lab.github.io/ai-name-app/">🧧 AI起名大师</a>
    <span style="color:#CCC;">|</span>
    <a href="javascript:share()">📤 分享给朋友</a>
    <span style="color:#CCC;">|</span>
    <span style="font-size:13px;color:var(--muted);">🆓 免费使用</span>
  </div>
</div>

<script>
let currentTab = 'score';
let apiKey = localStorage.getItem('ds_api_key') || '';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  // 岗位匹配模式显示JD输入框
  var jdGroup = document.getElementById('jd-group');
  var btnText = document.getElementById('btn-main-text');
  var btnSub = document.querySelector('.btn-sub');
  if (tab === 'match') {
    jdGroup.style.display = 'block';
    document.getElementById('resume-label').textContent = '粘贴你的简历内容（选填）';
    document.getElementById('resume-input').placeholder = '可选：粘贴你的简历让AI针对性优化...&#10;留空则由AI根据JD从头生成一份完整简历';
    btnText.textContent = '🎯 一键生成简历';
    btnSub.textContent = '只需粘贴JD，AI自动生成完整简历';
  } else {
    document.getElementById('resume-label').textContent = '粘贴你的简历内容';
    document.getElementById('resume-input').placeholder = '请粘贴你的简历文本（教育背景、工作经历、技能等）...\n\n💡 提示：越详细，AI分析越精准';
    jdGroup.style.display = 'none';
    btnText.textContent = '🚀 AI 优化简历';
    btnSub.textContent = '免费评分 + 智能改写建议';
  }
}

function toast(msg) {
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2000);
}

async function optimize() {
  const resume = document.getElementById('resume-input').value.trim();
  const isMatch = currentTab === 'match';
  // 岗位匹配模式：只需JD，简历可选
  if (isMatch) {
    const jd = document.getElementById('jd-input').value.trim();
    if (!jd || jd.length < 30) { toast('请粘贴招聘JD（至少30字）'); return; }
  } else {
    if (!resume || resume.length < 50) { toast('请粘贴至少50字的简历内容'); return; }
  }

  const btn = document.getElementById('optimize-btn');
  btn.disabled = true;
  document.getElementById('btn-main-text').textContent = '⏳ AI 正在分析...';

  document.getElementById('result-content').innerHTML = '<div class="loading"><div class="spinner"></div><p>AI 正在分析你的简历...</p></div>';
  document.getElementById('result-area').style.display = 'block';
  document.getElementById('result-area').scrollIntoView({behavior:'smooth'});

  if (apiKey) {
    try {
      const result = await callAI(resume);
      renderResult(result, resume);
    } catch(e) {
      renderFallback(resume);
    }
  } else {
    renderFallback(resume);
  }
  btn.disabled = false;
  document.getElementById('btn-main-text').textContent = '🚀 AI 优化简历';
}

async function callAI(resume) {
  var jd = document.getElementById('jd-input').value.trim();

  const prompts = {
    score: '请为以下简历评分(1-100)，指出3个优点和3个需要改进的地方。返回JSON: {"score":85,"strengths":["","",""],"weaknesses":["","",""]}',
    rewrite: '请改写以下简历使其更专业、更有竞争力，突出量化成果。返回JSON: {"rewritten":"改写后的完整简历文本"}',
    analyze: '请分析以下简历的行业匹配度、ATS通过率和关键词优化建议。返回JSON: {"industryMatch":"","atsScore":0,"keywords":["","",""]}',
    match: resume ?
      `根据以下招聘JD，将我的简历改写为高度匹配该岗位的定制版简历。分析JD中的关键要求并体现在简历中。返回JSON: {"matchScore":75,"rewritten":"定制版完整简历","matchAnalysis":"匹配度分析(100字内)","improvement":"需要补充的要点(100字内)"}` :
      `根据以下招聘JD，从头生成一份完全匹配该岗位的完整简历。虚构真实可信的个人信息、教育背景、工作经历、项目经验、技能和证书，全部紧密贴合JD要求。返回JSON: {"rewritten":"完整简历文本","matchAnalysis":"该岗位核心要求分析(100字内)"}`
  };

  var prompt = prompts[currentTab] || prompts.score;
  if (currentTab === 'match' && typeof prompts.match === 'function') {
    prompt = prompts.match(resume);
  }
  var userContent = `${prompt}\n\n`;
  if (currentTab === 'match' && jd) {
    userContent += `【招聘JD】\n${jd}`;
    if (resume) userContent += `\n\n【我的简历】\n${resume}`;
  } else {
    userContent += `简历：\n${resume}`;
  }

  var resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
    body:JSON.stringify({
      model:'deepseek-chat', temperature:0.7, max_tokens:2000,
      messages:[{role:'system',content:'你是资深HR和简历专家。只返回JSON格式。'},{role:'user',content:userContent}],
      response_format:{type:'json_object'}
    })
  });
  var data = await resp.json();
  return JSON.parse(data.choices[0].message.content);
}

function renderResult(result, originalResume) {
  let html = '';
  if (currentTab === 'match' && result.rewritten) {
    var hasScore = result.matchScore;
    // 无简历时没有分数，直接展示生成结果
    html = `
      ${hasScore ? `<div class="card">
        <div class="score-display">
          <div class="score-num" style="color:${result.matchScore >= 80 ? '#4CAF50' : '#FF9800'}">${result.matchScore}</div>
          <div class="score-label">岗位匹配度 / 100</div>
        </div>
        ${result.matchAnalysis ? `<div class="suggestion"><span class="icon">🔍</span>${result.matchAnalysis}</div>` : ''}
        ${result.improvement ? `<div class="suggestion"><span class="icon">💡</span>${result.improvement}</div>` : ''}
      </div>` : ''}
      <div class="card">
        <p style="font-weight:600;margin-bottom:8px;">${hasScore ? '🎯 定制版简历' : '✨ AI 根据JD生成的简历'}</p>
        <div class="optimized-text">${result.rewritten}</div>
        <button class="btn-copy" onclick="copyText(\`${result.rewritten.replace(/`/g,'\\`')}\`)">📋 一键复制</button>
        <button class="btn-copy" onclick="exportPDF()" style="margin-top:4px;">📄 导出PDF简历</button>
      </div>`;
  } else if (currentTab === 'score' && result.score) {
    const color = result.score >= 80 ? '#4CAF50' : result.score >= 60 ? '#FF9800' : '#C41E3A';
    html = `
      <div class="card">
        <div class="score-display">
          <div class="score-num" style="color:${color}">${result.score}</div>
          <div class="score-label">综合评分 / 100</div>
        </div>
        <div class="suggestions">
          <p style="font-weight:600;color:#4CAF50;margin-bottom:8px;">✅ 优势</p>
          ${(result.strengths||[]).map(s=>`<div class="suggestion"><span class="icon">👍</span>${s}</div>`).join('')}
          <p style="font-weight:600;color:#FF9800;margin:12px 0 8px;">⚠️ 需改进</p>
          ${(result.weaknesses||[]).map(w=>`<div class="suggestion"><span class="icon">💡</span>${w}</div>`).join('')}
        </div>
      </div>`;
  } else if (currentTab === 'rewrite' && result.rewritten) {
    html = `
      <div class="card">
        <p style="font-weight:600;margin-bottom:8px;">✍️ AI 改写版简历</p>
        <div class="optimized-text">${result.rewritten}</div>
        <button class="btn-copy" onclick="copyText(\`${result.rewritten.replace(/`/g,'\\`')}\`)">📋 一键复制改写版</button>
      </div>`;
  }
  document.getElementById('result-content').innerHTML = html;
}

function renderFallback(resume) {
  var wordCount = resume.length;
  var score = Math.min(95, 40 + Math.floor(wordCount / 20) + Math.floor(Math.random() * 20));
  var color = score >= 80 ? '#4CAF50' : '#FF9800';
  var strengths = ['简历内容详实，信息量充足','结构清晰，便于HR快速浏览','具备可量化的描述潜力'];
  var weaknesses = ['缺少具体数据支撑（建议加数字：如业绩提升X%）','关键词密度不足（建议加入行业术语）','个人优势不够突出（建议添加核心竞争力总结）'];

  if (currentTab === 'match') {
    document.getElementById('result-content').innerHTML = `
      <div class="card">
        <div class="score-display">
          <div class="score-num" style="color:#4CAF50">72</div>
          <div class="score-label">预估匹配度 / 100</div>
        </div>
        <div class="suggestion"><span class="icon">🔍</span>已根据JD分析关键要求，建议在简历中突出相关经验和技能</div>
        <div class="suggestion"><span class="icon">💡</span>配置 DeepSeek API Key 可获得更精准的岗位匹配（免费）</div>
      </div>`;
    return;
  }

  document.getElementById('result-content').innerHTML = `
    <div class="card">
      <div class="score-display">
        <div class="score-num" style="color:${color}">${score}</div>
        <div class="score-label">综合评分 / 100</div>
      </div>
      <div class="suggestions">
        <p style="font-weight:600;color:#4CAF50;margin-bottom:8px;">✅ 优势</p>
        ${strengths.map(s=>`<div class="suggestion"><span class="icon">👍</span>${s}</div>`).join('')}
        <p style="font-weight:600;color:#FF9800;margin:12px 0 8px;">⚠️ 需改进</p>
        ${weaknesses.map(w=>`<div class="suggestion"><span class="icon">💡</span>${w}</div>`).join('')}
      </div>
    </div>`;
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(()=>toast('✅ 已复制改写版简历')).catch(()=>toast('复制失败，请手动选择'));
}

function showDeepOptimize() { toast('🔮 深度优化 ¥9.9 — 支付后24小时内交付'); }

function exportPDF() {
  var content = document.querySelector('.optimized-text');
  if (!content) { toast('请先生成简历'); return; }
  var text = content.textContent;

  var w = window.open('', '_blank', 'width=800,height=600');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>个人简历</title>');
  w.document.write('<style>');
  w.document.write('@media print { body { -webkit-print-color-adjust: exact; } }');
  w.document.write('body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;padding:40px 50px;line-height:2.2;color:#2D2D2D;max-width:800px;margin:0 auto}');
  w.document.write('h1{text-align:center;font-size:22px;border-bottom:2px solid #C41E3A;padding-bottom:10px}');
  w.document.write('h3{color:#C41E3A;font-size:15px;margin:16px 0 4px;border-left:3px solid #C41E3A;padding-left:8px}');
  w.document.write('p{font-size:14px;margin:4px 0}');
  w.document.write('</style></head><body>');
  w.document.write('<h1>个人简历</h1>');
  w.document.write('<div style="font-size:14px;">');
  w.document.write(text.replace(/\n/g, '<br>').replace(/【(.+?)】/g, '<h3>$1</h3>'));
  w.document.write('</div></body></html>');
  w.document.close();
  // 等渲染完成后自动弹出打印
  setTimeout(function() { w.print(); }, 600);
}

function share() {
  const text = '📝 发现一个免费AI简历优化器！AI评分+改写，找工作必备 → ' + window.location.href;
  if (navigator.share) { navigator.share({title:'AI简历优化器',text}); }
  else { navigator.clipboard.writeText(text).then(()=>toast('已复制分享链接')); }
}
</script>
</body>
</html>
