<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="description" content="AI文案生成器 - 朋友圈/小红书/公众号/短视频文案一键生成，免费使用。">
<meta name="keywords" content="AI文案,文案生成,朋友圈文案,小红书文案,公众号文案,短视频脚本">
<title>AI文案生成器 - 朋友圈小红书公众号文案</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#D4A843;--red:#C41E3A;--bg:#FFF8F0;--card:#FFF;--text:#2D2D2D;--muted:#888;--border:#F0E6D3;--shadow:0 2px 16px rgba(0,0,0,0.06);--radius:16px}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{padding:20px 16px 40px;max-width:480px;margin:0 auto}
.hero{text-align:center;padding:24px 0 16px}
.hero-icon{font-size:48px}
.hero h1{font-size:24px;background:linear-gradient(135deg,#C41E3A,#D4A843);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.hero p{color:var(--muted);font-size:14px}
.type-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:8px 14px;border-radius:20px;font-size:13px;white-space:nowrap;cursor:pointer;background:#FFF;border:1.5px solid var(--border);transition:all .2s}
.tab.active{border-color:var(--gold);background:#F5E6CC;font-weight:600}
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:14px;font-weight:600;margin-bottom:6px;color:#555}
textarea{width:100%;padding:12px;border:2px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;resize:vertical;line-height:1.6;background:#FFFAF5}
textarea:focus{outline:none;border-color:var(--gold)}
.btn-primary{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#C41E3A,#E8453C);color:#FFF;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(196,30,58,0.25)}
.btn-primary:disabled{opacity:0.6}
.result-box{background:#F9FAFB;border:1px solid var(--border);border-radius:12px;padding:16px;font-size:14px;line-height:1.8;white-space:pre-wrap;margin-top:8px;display:none}
.btn-copy{width:100%;padding:10px;border:2px solid var(--border);border-radius:12px;background:#FFF;font-size:14px;cursor:pointer;margin-top:8px}
.loading{text-align:center;padding:20px;display:none}
.spinner{width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.upgrade-card{background:linear-gradient(135deg,#2D2D2D,#4A3728);color:#FFF;border-radius:var(--radius);padding:20px;text-align:center;margin-top:12px}
.upgrade-card h3{font-size:18px;margin-bottom:6px}
.upgrade-card p{font-size:13px;opacity:0.8;margin-bottom:14px}
.btn-upgrade{padding:12px 32px;border:none;border-radius:24px;background:var(--gold);color:#2D2D2D;font-size:15px;font-weight:700;cursor:pointer}
.tool-bar{display:flex;justify-content:center;gap:20px;padding:12px 0;margin-top:20px;border-top:1px solid var(--border);font-size:13px}
.tool-bar a{color:var(--muted);text-decoration:none}
.tool-bar a:hover{color:var(--gold)}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#FFF;padding:12px 24px;border-radius:24px;font-size:14px;z-index:200;animation:fadeInOut 2s forwards}
@keyframes fadeInOut{0%{opacity:0;transform:translate(-50%,-50%) scale(0.8)}15%{opacity:1;transform:translate(-50%,-50%) scale(1)}85%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div class="container">
<div class="hero">
<div class="hero-icon">✍️</div>
<h1>AI 文案生成器</h1>
<p>朋友圈·小红书·公众号·短视频 一键生成</p>
</div>

<div class="type-tabs">
<div class="tab active" data-type="朋友圈">📱 朋友圈</div>
<div class="tab" data-type="小红书">📕 小红书</div>
<div class="tab" data-type="公众号">📰 公众号</div>
<div class="tab" data-type="短视频">🎬 短视频</div>
<div class="tab" data-type="广告语">💡 广告语</div>
</div>

<div class="card">
<div class="form-group">
<label>主题 / 产品</label>
<textarea id="topic" rows="2" placeholder="例如：新品奶茶上市、618大促、旅游攻略..."></textarea>
</div>
<div class="form-group">
<label>关键词 / 要求（选填）</label>
<textarea id="keywords" rows="2" placeholder="例如：年轻化、幽默风格、突出优惠..."></textarea>
</div>
<button class="btn-primary" onclick="generate()">🚀 AI 生成文案</button>
</div>

<div class="loading" id="loading"><div class="spinner"></div><p>AI 正在创作...</p></div>
<div class="result-box" id="result"></div>
<button class="btn-copy" id="copyBtn" style="display:none" onclick="copyResult()">📋 一键复制</button>

<div class="upgrade-card">
<h3>🔮 批量生成 · 定制风格</h3>
<p>一次生成10条 + 指定语气/字数/平台调性</p>
<button class="btn-upgrade" onclick="toast('💎 深度服务 ¥9.9 — 联系客服开通')">深度文案 ¥9.9</button>
</div>

<div class="tool-bar">
<a href="/ai-name-app/">🧧 AI起名</a>
<a href="/ai-name-app/resume/">📝 简历优化</a>
<a href="javascript:share()">📤 分享</a>
</div>
</div>

<script>
let currentType = '朋友圈', apiKey = localStorage.getItem('ds_api_key') || '';

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', function() {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  this.classList.add('active');
  currentType = this.dataset.type;
}));

function toast(m) { var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2000); }

async function generate() {
  var topic = document.getElementById('topic').value.trim();
  if (!topic) { toast('请输入主题或产品'); return; }
  var keywords = document.getElementById('keywords').value.trim();
  var btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = '⏳ AI 正在创作...';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('copyBtn').style.display = 'none';

  var result = '';
  if (apiKey) {
    try {
      var resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
        body:JSON.stringify({
          model:'deepseek-chat',temperature:0.9,max_tokens:800,
          messages:[
            {role:'system',content:'你是顶级文案写手，擅长写爆款'+currentType+'文案。直接输出文案，不要多余的话。'},
            {role:'user',content:`写一条${currentType}文案，主题：${topic}。${keywords?'要求：'+keywords:''}要求语言精炼、有吸引力。`}
          ]
        })
      });
      var data = await resp.json();
      result = data.choices[0].message.content;
    } catch(e) {
      result = generateFallback(topic, keywords);
    }
  } else {
    result = generateFallback(topic, keywords);
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').textContent = result;
  document.getElementById('copyBtn').style.display = 'block';
  btn.disabled = false; btn.textContent = '🚀 AI 生成文案';
}

function generateFallback(topic, keywords) {
  var templates = {
    '朋友圈': ['🔥 发现了！'+topic+'真的太惊喜了！兄弟们冲！','刚试了'+topic+'，绝绝子🤩 必须安利给你们 #好物分享'],
    '小红书': ['📕 姐妹们！'+topic+'我替你们试过了，真的可以冲！\n\n✨ 亮点一：效果绝了\n✨ 亮点二：性价比炸裂\n✨ 亮点三：谁用谁知道\n\n#种草 #'+topic],
    '公众号': ['点击蓝字关注我们\n\n【重磅】'+topic+'\n\n今天我们来聊聊一个很多人都关心的话题...\n\n（全文共1500字，阅读约需3分钟）'],
    '短视频': ['🎬 你是不是也遇到过：\n'+topic+'该怎么办？\n\n今天3秒教会你！\n#干货 #教程'],
    '广告语': ['✨ '+topic+'，不一样的选择\n限时特惠，马上行动！']
  };
  var list = templates[currentType] || templates['朋友圈'];
  return list[Math.floor(Math.random()*list.length)];
}

function copyResult() {
  var t = document.getElementById('result').textContent;
  navigator.clipboard.writeText(t).then(()=>toast('✅ 已复制文案')).catch(()=>toast('复制失败'));
}

function share() {
  var t = '✍️ 发现免费AI文案生成器！朋友圈小红书公众号一键生成 → '+window.location.href;
  navigator.clipboard.writeText(t).then(()=>toast('已复制分享链接'));
}
</script>
</body>
</html>
